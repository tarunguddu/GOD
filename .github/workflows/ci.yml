name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so `god who` works

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=god_agent --cov-report=term-missing

      # Dogfood the agent's own gates as hard CI checks.
      - name: Self critique gate (deterministic security/quality)
        run: |
          status=0
          for f in $(git ls-files 'src/**/*.py'); do
            god critique "$f" >/dev/null || { echo "BLOCKED: $f"; god critique "$f"; status=1; }
          done
          exit $status

      - name: Project health gate
        run: god health
